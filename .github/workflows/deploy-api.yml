name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"

permissions:
  contents: read
  id-token: write  # Required for WIF

env:
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  IMAGE_NAME: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/berberim/api

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image tag
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build \
            --platform linux/amd64 \
            -f api/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SERVICE_ACCOUNT }}

      - name: Deploy api-grpc (dev)
        run: |
          gcloud run services update dev-berberim-api-grpc \
            --image=${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }} \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy api-http (dev)
        run: |
          gcloud run services update dev-berberim-api-http \
            --image=${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }} \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }}

