// ── Admin: analytics ──────────────────────────────────────────────────────────

message PopularService {
  string name = 1;
  int32 count = 2;
  double progress = 3; // 0.0–1.0 relative to top service
}

message AnalyticsOverview {
  // Appointment metrics
  int32 total_appointments = 1;
  int32 completed_appointments = 2;
  int32 cancelled_appointments = 3;
  double no_show_rate = 4;         // percentage 0–100
  string total_revenue = 5;        // e.g. "4960.00"
  string appointments_change = 6;  // e.g. "+12%"
  string no_show_rate_change = 15; // e.g. "-2%"

  // Customer insights
  int32 active_customers = 7;
  double returning_rate = 8;       // percentage 0–100
  double visit_frequency = 9;      // avg visits per customer

  // Operational performance
  double staff_utilization = 10;   // percentage 0–100
  repeated PopularService popular_services = 11;

  // Loyalty engagement
  int32 rewards_redeemed = 12;
  string redeemed_change = 13;     // e.g. "+18%"
  int32 loyalty_progress = 14;     // percentage 0–100
}

message GetAnalyticsOverviewRequest {
  string range = 1; // "daily" | "weekly" | "monthly"
}

message GetAnalyticsOverviewResponse {
  AnalyticsOverview overview = 1;
}

// ── Admin: advanced analytics ────────────────────────────────────────────────

message GetCohortAnalysisRequest {
  int32 months_back = 1; // how many cohort months to include (default 6, max 12)
}

message CohortPeriod {
  int32 months_after = 1;      // 0 = cohort month itself, 1 = next month, etc.
  int32 active_customers = 2;
  double retention_rate = 3;   // percentage 0-100
  string revenue = 4;
}

message CohortMonth {
  string cohort = 1;           // e.g. "2026-01"
  int32 cohort_size = 2;
  repeated CohortPeriod periods = 3;
}

message GetCohortAnalysisResponse {
  repeated CohortMonth cohorts = 1;
}

message GetRetentionAnalysisRequest {
  string range = 1; // "30d" | "60d" | "90d" | "180d" | "365d" (default "90d")
}

message RetentionBucket {
  string label = 1;           // e.g. "0-30 days"
  int32 customer_count = 2;
  double percentage = 3;
}

message RetentionByCohort {
  string cohort = 1;
  double return_rate_30d = 2;
  double return_rate_60d = 3;
  double return_rate_90d = 4;
}

message GetRetentionAnalysisResponse {
  int32 total_customers = 1;
  int32 returned_customers = 2;
  double overall_return_rate = 3;
  double avg_days_between_visits = 4;
  repeated RetentionBucket buckets = 5;
  repeated RetentionByCohort by_cohort = 6;
}

message GetCustomerLTVRequest {
  string segment_by = 1; // "cohort" | "acquisition_channel" | "service_category" (default "cohort")
}

message LTVSummary {
  string avg_ltv = 1;
  string median_ltv = 2;
  double avg_visits = 3;
  string avg_revenue_per_visit = 4;
  double avg_lifespan_days = 5;
}

message LTVSegment {
  string segment = 1;
  int32 customer_count = 2;
  string avg_ltv = 3;
  double avg_visits = 4;
  string avg_revenue_per_visit = 5;
}

message GetCustomerLTVResponse {
  LTVSummary summary = 1;
  repeated LTVSegment segments = 2;
}

message GetNoShowAnalysisRequest {
  string range = 1; // "monthly" | "quarterly" | "yearly" (default "monthly")
}

message NoShowByStaff {
  string staff_user_id = 1;
  string staff_name = 2;
  int32 total_appointments = 3;
  int32 no_show_count = 4;
  double no_show_rate = 5;
}

message NoShowByTimeSlot {
  string time_slot = 1;          // "morning" | "afternoon" | "evening"
  int32 total_appointments = 2;
  int32 no_show_count = 3;
  double no_show_rate = 4;
}

message NoShowByDayOfWeek {
  int32 day_of_week = 1;         // 0=Sunday ... 6=Saturday
  string day_name = 2;
  int32 total_appointments = 3;
  int32 no_show_count = 4;
  double no_show_rate = 5;
}

message NoShowTrend {
  string period = 1;             // e.g. "2026-01" or "2026-Q1"
  int32 total_appointments = 2;
  int32 no_show_count = 3;
  double no_show_rate = 4;
}

message GetNoShowAnalysisResponse {
  int32 total_no_shows = 1;
  double overall_no_show_rate = 2;
  repeated NoShowByStaff by_staff = 3;
  repeated NoShowByTimeSlot by_time_slot = 4;
  repeated NoShowByDayOfWeek by_day_of_week = 5;
  repeated NoShowTrend trends = 6;
}

